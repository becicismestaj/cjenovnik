<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cjenovnik</title>

<style>
body {
  font-family: Arial;
  max-width: 500px;
  margin: auto;
  padding: 20px;
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
.result {
  margin-top: 20px;
  padding: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>Provjera cijene</h2>

<label>Datum dolaska</label>
<input type="date" id="start">

<label>Datum odlaska</label>
<input type="date" id="end">

<label>Broj osoba</label>
<select id="persons">
  <option value="1">1 osoba</option>
  <option value="2">2 osobe</option>
</select>

<button onclick="getPrice()">Provjeri cijenu</button>

<div class="result" id="result">
Ovdje će se prikazati cijena.
</div>

<script>

function getPrice() {

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  if (!start || !end) {
    document.getElementById("result").innerHTML = "Molimo unesite datume.";
    return;
  }

  const url = "https://opensheet.elk.sh/e/2PACX-1vQ5UNnbAnQYIILeUjzBBnKsxDB0D6n-cL81wIItdV3FzM1CZiKWi8edmCfrJwZIJussluoBoE1X_YMP/CIJENE";

  fetch(url)
    .then(res => res.json())
    .then(data => {

      let totalEconomy = 0;
      let totalStandard = 0;
      let totalLasadu = 0;

      let foundDays = 0;

      data.forEach(row => {

const rawDate = row["Datum"];

// pretvaramo 01.06.2026 → 2026-06-01
const parts = rawDate.split(".");
const formattedDate = parts[2] + "-" + parts[1].padStart(2, '0') + "-" + parts[0].padStart(2, '0');

if (formattedDate >= start && formattedDate < end) {

          if (row["Studio Economy Guesthouse"]) {
            totalEconomy += parseFloat(row["Studio Economy Guesthouse"]);
          }

          if (row["Studio Standard Guesthouse"]) {
            totalStandard += parseFloat(row["Studio Standard Guesthouse"]);
          }

          if (row["Studio Lasadu"]) {
            totalLasadu += parseFloat(row["Studio Lasadu"]);
          }

          foundDays++;
        }

      });

      if (foundDays === 0) {
        document.getElementById("result").innerHTML =
          "Nema podataka za odabrane datume.";
        return;
      }

      document.getElementById("result").innerHTML =
        "<b>Studio Economy:</b> " + totalEconomy + " EUR<br>" +
        "<b>Studio Standard:</b> " + totalStandard + " EUR<br>" +
        "<b>Studio Lasadu:</b> " + totalLasadu + " EUR<br><br>" +
        "Boravišna taksa nije uključena (1€ po osobi po noći).";

    });

}

</script>

</body>
</html>
